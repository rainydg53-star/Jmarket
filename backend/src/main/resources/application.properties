spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3307/jmarket?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=UTF-8}
spring.datasource.username=${DB_USERNAME:jmarket}
spring.datasource.password=${DB_PASSWORD:1234}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false
spring.servlet.multipart.max-file-size=${MAX_FILE_SIZE:5MB}
spring.servlet.multipart.max-request-size=${MAX_REQUEST_SIZE:50MB}
spring.cache.type=${SPRING_CACHE_TYPE:redis}
spring.cache.redis.time-to-live=${CACHE_TTL:60s}
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.timeout=${REDIS_TIMEOUT:2s}

jwt.secret=${JWT_SECRET:ThisIsVeryLongSecretKeyForJwtTokenGenerationAtLeastThirtyTwoBytes}
jwt.access-token-validity-seconds=${JWT_ACCESS_TOKEN_VALIDITY_SECONDS:900}
jwt.refresh-token-validity-seconds=${JWT_REFRESH_TOKEN_VALIDITY_SECONDS:1209600}
jwt.refresh-token-cookie-secure=${JWT_REFRESH_TOKEN_COOKIE_SECURE:false}
jmarket.rate-limit.enabled=${JMARKET_RATE_LIMIT_ENABLED:true}
jmarket.search.engine=${JMARKET_SEARCH_ENGINE:database}
spring.elasticsearch.uris=${ELASTICSEARCH_URIS:http://localhost:9200}

spring.mail.host=${MAIL_HOST:}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.default-encoding=UTF-8
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS_ENABLE:true}
spring.mail.properties.mail.smtp.starttls.required=${MAIL_SMTP_STARTTLS_REQUIRED:true}

app.auth.email-verification.mail-enabled=${MAIL_ENABLED:false}
app.auth.email-verification.expose-dev-code=${MAIL_EXPOSE_DEV_CODE:true}
app.auth.email-verification.from=${MAIL_FROM:no-reply@jmarket.local}

server.port=${SERVER_PORT:8081}
auction.auto-close-interval-ms=${AUCTION_AUTO_CLOSE_INTERVAL_MS:30000}
auction.closed-visible-hours=${AUCTION_CLOSED_VISIBLE_HOURS:24}

kakaopay.base-url=${KAKAOPAY_BASE_URL:https://open-api.kakaopay.com}
kakaopay.secret-key=${KAKAOPAY_SECRET_KEY:}
kakaopay.cid=${KAKAOPAY_CID:TC0ONETIME}
kakaopay.approval-url=${KAKAOPAY_APPROVAL_URL:http://localhost:5173/mileage?status=approved}
kakaopay.cancel-url=${KAKAOPAY_CANCEL_URL:http://localhost:5173/mileage?status=cancel}
kakaopay.fail-url=${KAKAOPAY_FAIL_URL:http://localhost:5173/mileage?status=fail}

social.kakao.client-id=${KAKAO_CLIENT_ID:}
social.kakao.client-secret=${KAKAO_CLIENT_SECRET:}
social.kakao.redirect-uri=${KAKAO_REDIRECT_URI:http://localhost:5173/oauth/callback/kakao}
social.kakao.authorize-uri=${KAKAO_AUTHORIZE_URI:https://kauth.kakao.com/oauth/authorize}
social.kakao.token-uri=${KAKAO_TOKEN_URI:https://kauth.kakao.com/oauth/token}
social.kakao.user-info-uri=${KAKAO_USER_INFO_URI:https://kapi.kakao.com/v2/user/me}

social.naver.client-id=${NAVER_CLIENT_ID:}
social.naver.client-secret=${NAVER_CLIENT_SECRET:}
social.naver.redirect-uri=${NAVER_REDIRECT_URI:http://localhost:5173/oauth/callback/naver}
social.naver.authorize-uri=${NAVER_AUTHORIZE_URI:https://nid.naver.com/oauth2.0/authorize}
social.naver.token-uri=${NAVER_TOKEN_URI:https://nid.naver.com/oauth2.0/token}
social.naver.user-info-uri=${NAVER_USER_INFO_URI:https://openapi.naver.com/v1/nid/me}
