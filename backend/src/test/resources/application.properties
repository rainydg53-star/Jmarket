spring.datasource.url=jdbc:h2:mem:jmarket-test;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.open-in-view=false
spring.cache.type=simple

jwt.secret=TestSecretKeyForJwtTokenGenerationAtLeastThirtyTwoBytes
jwt.access-token-validity-seconds=3600
jmarket.rate-limit.enabled=false
